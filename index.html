/* ── GITHUB GIST SYNC ──────────────────────────────────────────────────────── */
function loadSyncCfg(){try{const r=localStorage.getItem(SYNC_KEY);return r?JSON.parse(r):{token:'',gistId:''};}catch(e){return{token:'',gistId:''};}}
function saveSyncCfg(c){try{localStorage.setItem(SYNC_KEY,JSON.stringify(c));}catch(e){}}
async function gistPush(token,gistId,state){
  const body={description:'Accounting English Trainer progress',files:{'progress.json':{content:JSON.stringify(state)}}};
  if(!gistId){
    const r=await fetch('https://api.github.com/gists',{method:'POST',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify({...body,public:false})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return(await r.json()).id;
  }
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{method:'PATCH',headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return gistId;
}
async function gistPull(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`token ${token}`}});
  if(!r.ok)return null;
  const d=await r.json();
  const f=d&&d.files?d.files['progress.json']:null;
  const c=f?f.content:null;
  return c?JSON.parse(c):null;
}
function mergeRemote(remote){
  const s={...defaultState(),...remote};
  VOCAB.forEach(w=>{if(!s.words[w.id])s.words[w.id]=defaultWord();});
  if(!s.achievements)s.achievements=[];
  if(s.sessions==null)s.sessions=0;
  if(s.xp==null)s.xp=0;
  if(s.totalCorrect==null)s.totalCorrect=0;
  if(s.totalWrong==null)s.totalWrong=0;
  if(s.dailyGoal==null)s.dailyGoal=250;
  if(s.todayXp==null)s.todayXp=0;
  if(s.lastXpDate!==todayKey())s.todayXp=0;
  return s;
}

/* ── HELPERS ────────────────────────────────────────────────────────────────── */
function todayKey() { return new Date().toISOString().slice(0,10); }
function addDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
function getLevel(xp) { let lv=LEVELS[0]; for(const l of LEVELS){if(xp>=l.min)lv=l;else break;} return lv; }
function getLevelIdx(xp) { let i=0; for(let j=0;j<LEVELS.length;j++){if(xp>=LEVELS[j].min)i=j;} return i; }
function getMastered(state) { return VOCAB.filter(w=>state.words[w.id]&&state.words[w.id].box>=3).length; }
function makeOptions(word, dir) {
  const key = dir==='en2fi'?'fi':'en';
  const correct = word[key];
  const pool = VOCAB.filter(w=>w.id!==word.id).map(w=>w[key]).sort(()=>Math.random()-0.5).slice(0,3);
  return [correct,...pool].sort(()=>Math.random()-0.5);
}
function defaultWord() { return {box:0,nextReview:todayKey(),correct:0,wrong:0,seen:false}; }
function defaultState() {
  const words={};
  VOCAB.forEach(w=>{words[w.id]=defaultWord();});
  return {words,xp:0,sessions:0,streak:0,lastSession:null,achievements:[],totalCorrect:0,totalWrong:0,maxCombo:0,dailyGoal:250,todayXp:0,lastXpDate:null};
}
function loadState() {
  try {
    const raw=localStorage.getItem(SK);
    if(!raw) { console.log('[acceng] localStorage tyhjä — palautetaan oletustila'); return defaultState(); }
    const s=JSON.parse(raw);
    console.log('[acceng] loadState:', {xp:s.xp, sessions:s.sessions, streak:s.streak, achievements:(s.achievements||[]).length, wordCount:Object.keys(s.words||{}).length, masteredCount:Object.values(s.words||{}).filter(w=>w&&w.box>=3).length});
    if(!s.words) s.words={};
    VOCAB.forEach(w=>{if(!s.words[w.id])s.words[w.id]=defaultWord();});
    if(!s.achievements) s.achievements=[];
    if(s.maxCombo==null) s.maxCombo=0;
    if(s.totalCorrect==null) s.totalCorrect=0;
    if(s.totalWrong==null) s.totalWrong=0;
    if(s.dailyGoal==null) s.dailyGoal=250;
    if(s.todayXp==null) s.todayXp=0;
    if(s.lastXpDate==null) s.lastXpDate=null;
    if(s.xp==null) s.xp=0;
    if(s.sessions==null) s.sessions=0;
    if(s.streak==null) s.streak=0;
    // Reset todayXp if new day
    if(s.lastXpDate!==todayKey()) s.todayXp=0;
    return s;
  } catch(e) { return defaultState(); }
}
function saveState(s) { try{localStorage.setItem(SK,JSON.stringify(s));}catch(e){} }
function checkAchievements(s) {
  const earned=new Set(s.achievements||[]);
  const mastered=getMastered(s);
  const newA=[];
  const chk=(id,cond)=>{if(cond&&!earned.has(id))newA.push(id);};
  chk('first_session',s.sessions>=1);
  chk('sessions_10',s.sessions>=10);
  chk('sessions_50',s.sessions>=50);
  chk('sessions_100',s.sessions>=100);
  chk('streak_3',s.streak>=3);
  chk('streak_7',s.streak>=7);
  chk('streak_14',s.streak>=14);
  chk('streak_30',s.streak>=30);
  chk('streak_60',s.streak>=60);
  chk('words_25',mastered>=25);
  chk('words_50',mastered>=50);
  chk('words_75',mastered>=75);
  chk('words_all',mastered>=VOCAB.length);
  chk('combo_10',s.maxCombo>=10);
  chk('combo_20',s.maxCombo>=20);
  chk('ifrs_master',VOCAB.filter(w=>w.cat==='ifrs').every(w=>s.words[w.id]?.box>=3));
  chk('controlling_master',VOCAB.filter(w=>w.cat==='controlling').every(w=>s.words[w.id]?.box>=3));
  chk('balance_master',VOCAB.filter(w=>w.cat==='balance').every(w=>s.words[w.id]?.box>=3));
  chk('income_master',VOCAB.filter(w=>w.cat==='income').every(w=>s.words[w.id]?.box>=3));
  chk('phrases_master',VOCAB.filter(w=>w.cat==='phrases').every(w=>s.words[w.id]?.box>=3));
  return newA;
}

/* ── UI PERUSKOMPONENTIT ────────────────────────────────────────────────────── */
function Shell({children}) {
  return (
    <div style={{position:'fixed',inset:0,background:C.bg,display:'flex',flexDirection:'column',fontFamily:FU,overflow:'hidden'}}>
      {children}
    </div>
  );
}

const holeS = {width:11,height:11,borderRadius:'50%',background:'#0d0a07',boxShadow:'inset 0 1px 3px rgba(0,0,0,0.7)',flexShrink:0};

function IndexCard({cat,children,style,onClick}) {
  const col = catColor(cat||'basics');
  return (
    <div onClick={onClick} style={{
      ...paperBg,...paperGrain,
      borderRadius:8,overflow:'hidden',position:'relative',
      boxShadow:'0 4px 20px rgba(0,0,0,0.5),0 2px 6px rgba(0,0,0,0.3)',
      cursor:onClick?'pointer':'default',
      ...style,
    }}>
      <div style={{height:6,background:col,width:'100%'}} />
      <div style={{display:'flex',gap:0}}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'12px 6px',borderRight:`1px solid ${C.paperEdge}`}}>
          <div style={holeS}/><div style={holeS}/>
        </div>
        <div style={{flex:1,padding:'12px 14px 14px'}}>{children}</div>
      </div>
    </div>
  );
}

function LevelBadge({xp,size=48}) {
  const idx=Math.min(getLevelIdx(xp||0),TIER_GLYPHS.length-1);
  return (
    <div style={{width:size,height:size,border:`2px solid ${C.accentDark}`,borderRadius:6,background:C.bgGlow,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

/* ── PRACTICE ───────────────────────────────────────────────────────────────── */
function Practice({mode,words,onFinish}) {
  const [idx,setIdx]=useState(0);
  const [flipped,setFlipped]=useState(false);
  const [selected,setSelected]=useState(null);
  const [options,setOptions]=useState([]);
  const [results,setResults]=useState([]);
  const [dir]=useState(()=>Math.random()<0.5?'fi2en':'en2fi');
  const word=words[idx];

  useEffect(()=>{
    if(word&&mode==='quiz') setOptions(makeOptions(word,dir));
    setFlipped(false); setSelected(null);
  },[idx]);

  function answer(correct) {
    const r=[...results,{id:word.id,correct}];
    setResults(r);
    setTimeout(()=>setIdx(i=>i+1),correct?400:700);
  }

  if(!word) {
    const ok=results.filter(r=>r.correct).length;
    const pct=results.length>0?Math.round((ok/results.length)*100):0;
    return (
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,padding:24}}>
        <div style={{fontFamily:FM,fontSize:56,color:pct>=80?'#4ade80':pct>=60?C.accent:'#f87171'}}>{pct}%</div>
        <div style={{fontFamily:FU,fontSize:15,color:C.inkMute}}>{ok} / {results.length} oikein</div>
        <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%',maxWidth:320}}>
          {results.map((r,i)=>{
            const w=VOCAB.find(v=>v.id===r.id);
            return w?(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:C.bgGlow,borderRadius:8,borderLeft:`3px solid ${r.correct?'#4ade80':'#f87171'}`}}>
                <span style={{fontFamily:FS,fontSize:15,color:C.paper,flex:1}}>{w.en}</span>
                <span style={{fontFamily:FU,fontSize:11,color:C.inkMute}}>{w.fi}</span>
              </div>
            ):null;
          })}
        </div>
        <button onClick={()=>onFinish(results)} style={{padding:'14px 48px',border:'none',borderRadius:10,cursor:'pointer',background:`linear-gradient(135deg,${C.accentDark},${C.accent})`,color:'#fff',fontFamily:FS,fontSize:18,fontWeight:600,boxShadow:`0 4px 16px rgba(201,122,60,0.3)`}}>Valmis</button>
      </div>
    );
  }

  const prompt=dir==='fi2en'?word.fi:word.en;
  const answer2=dir==='fi2en'?word.en:word.fi;
  const correctOpt=dir==='fi2en'?word.en:word.fi;
  const prog=idx/words.length;

  if(mode==='flash') {
    return (
      <div style={{flex:1,overflow:'auto',padding:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
          <span style={{fontFamily:FM,fontSize:12,color:C.inkMute}}>{idx+1}/{words.length}</span>
          <div style={{flex:1,height:3,background:C.bgGlow,borderRadius:2}}>
            <div style={{height:'100%',width:`${prog*100}%`,background:C.accent,borderRadius:2,transition:'width 0.3s'}}/>
          </div>
        </div>
        <IndexCard cat={word.cat} style={{marginBottom:12}} onClick={()=>setFlipped(f=>!f)}>
          <div style={{minHeight:110,display:'flex',flexDirection:'column',justifyContent:'center',gap:8}}>
            <div style={{fontSize:10,fontFamily:FM,color:catColor(word.cat),textTransform:'uppercase',letterSpacing:'0.1em'}}>{CATS[word.cat]?.short} · {'★'.repeat(word.diff)}</div>
            <div style={{fontFamily:FS,fontSize:28,color:C.ink,fontWeight:600,lineHeight:1.2}}>{prompt}</div>
            {!flipped&&<div style={{fontFamily:FU,fontSize:11,color:C.inkFaint}}>Napauta kääntääksesi</div>}
            {flipped&&<>
              <div style={{fontFamily:FS,fontSize:22,color:C.inkLight,fontStyle:'italic',borderTop:`1px solid ${C.paperEdge}`,paddingTop:8}}>{answer2}</div>
              {word.exEn&&<div style={{fontFamily:FU,fontSize:11,color:C.inkMute}}>{word.exEn}</div>}
              {word.tip&&<div style={{fontFamily:FU,fontSize:10,color:C.inkFaint,marginTop:2}}>{word.tip}</div>}
            </>}
          </div>
        </IndexCard>
        {flipped&&(
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>answer(false)} style={{flex:1,padding:'14px 0',border:'none',borderRadius:8,cursor:'pointer',background:'#2a1010',color:'#f87171',fontFamily:FU,fontSize:14,fontWeight:600}}>✗ En tiennyt</button>
            <button onClick={()=>answer(true)} style={{flex:1,padding:'14px 0',border:'none',borderRadius:8,cursor:'pointer',background:'#102a10',color:'#4ade80',fontFamily:FU,fontSize:14,fontWeight:600}}>✓ Tiesin</button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{flex:1,overflow:'auto',padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}>
        <span style={{fontFamily:FM,fontSize:12,color:C.inkMute}}>{idx+1}/{words.length}</span>
        <div style={{flex:1,height:3,background:C.bgGlow,borderRadius:2}}>
          <div style={{height:'100%',width:`${prog*100}%`,background:C.accent,borderRadius:2,transition:'width 0.3s'}}/>
        </div>
      </div>
      <IndexCard cat={word.cat} style={{marginBottom:12}}>
        <div style={{minHeight:80,display:'flex',flexDirection:'column',justifyContent:'center',gap:6}}>
          <div style={{fontSize:10,fontFamily:FM,color:catColor(word.cat),textTransform:'uppercase',letterSpacing:'0.1em'}}>{CATS[word.cat]?.short} · {'★'.repeat(word.diff)}</div>
          <div style={{fontFamily:FS,fontSize:28,color:C.ink,fontWeight:600}}>{prompt}</div>
          <div style={{fontFamily:FU,fontSize:11,color:C.inkMute}}>{dir==='fi2en'?'Valitse englanninkielinen vastine':'Valitse suomenkielinen vastine'}</div>
        </div>
      </IndexCard>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {options.map((opt,i)=>{
          const isCorrect=opt===correctOpt, isSel=selected===opt;
          let bg=C.bgGlow,col2=C.paper,border=`1px solid #2a201a`;
          if(selected){
            if(isCorrect){bg='#102a10';col2='#4ade80';border='1px solid #4ade80';}
            else if(isSel){bg='#2a1010';col2='#f87171';border='1px solid #f87171';}
          }
          return (
            <button key={i} onClick={()=>{
              if(selected) return;
              setSelected(opt);
              setTimeout(()=>answer(opt===correctOpt),700);
            }} style={{padding:'13px 14px',border,borderRadius:8,cursor:selected?'default':'pointer',background:bg,color:col2,fontFamily:FU,fontSize:14,textAlign:'left',transition:'all 0.2s'}}>
              {opt}
            </button>
          );
        })}
      </div>
      {selected&&word.tip&&(
        <div style={{marginTop:12,padding:'10px 12px',background:C.bgGlow,borderRadius:8,borderLeft:`3px solid ${C.accent}`}}>
          <div style={{fontFamily:FU,fontSize:11,color:C.inkFaint}}>{word.tip}</div>
        </div>
      )}
    </div>
  );
}

      <button onClick={()=>setShowExp(true)} style={{width:'100%',padding:'12px',background:C.bgGlow,border:`1px solid #2a201a`,borderRadius:8,cursor:'pointer',color:C.paper,fontFamily:FU,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:16}}>

/* ── SETTINGS VIEW ──────────────────────────────────────────────────────────── */
function SettingsView({state,onReset,onGoalChange,syncStatus,setSyncStatus,onSyncLoad}) {
  const [conf,setConf]=useState(false),[imp,setImp]=useState(false);
  const goal=state.dailyGoal||250;
  const [syncCfg,setSyncCfgState]=useState(loadSyncCfg);
  const [tokenInput,setTokenInput]=useState(()=>loadSyncCfg().token||'');
  const [syncMsg,setSyncMsg]=useState('');

  async function handleConnect(){
    if(!tokenInput.trim()){setSyncMsg('Syötä token ensin.');return;}
    setSyncStatus('syncing');setSyncMsg('Yhdistetään...');
    try{
      const cfg=loadSyncCfg();
      const newId=await gistPush(tokenInput.trim(),cfg.gistId||'',state);
      const newCfg={token:tokenInput.trim(),gistId:newId};
      saveSyncCfg(newCfg);setSyncCfgState(newCfg);
      setSyncStatus('ok');setSyncMsg('✓ Yhdistetty ja tallennettu!');
    }catch(e){setSyncStatus('err');setSyncMsg('Virhe: '+e.message+' — tarkista token.');}
  }
  async function handlePull(){
    const cfg=loadSyncCfg();
    if(!cfg.token||!cfg.gistId){setSyncMsg('Ei yhteyttä — yhdistä ensin.');return;}
    setSyncStatus('syncing');setSyncMsg('Ladataan pilvestä...');
    try{
      const remote=await gistPull(cfg.token,cfg.gistId);
      if(!remote){setSyncMsg('Gistissä ei dataa.');setSyncStatus('err');return;}
      onSyncLoad(remote);setSyncStatus('ok');
      setSyncMsg(`✓ Ladattu! XP: ${remote.xp||0}, Sessiot: ${remote.sessions||0}`);
    }catch(e){setSyncStatus('err');setSyncMsg('Virhe: '+e.message);}
  }
  async function handlePush(){
    const cfg=loadSyncCfg();
    if(!cfg.token||!cfg.gistId){setSyncMsg('Ei yhteyttä — yhdistä ensin.');return;}
    setSyncStatus('syncing');setSyncMsg('Tallennetaan pilveen...');
    try{
      await gistPush(cfg.token,cfg.gistId,state);
      setSyncStatus('ok');setSyncMsg('✓ Tallennettu pilveen!');
    }catch(e){setSyncStatus('err');setSyncMsg('Virhe: '+e.message);}
  }
  function exportData(){
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`sanasto-${todayKey()}.json`; a.click();
    URL.revokeObjectURL(url);
  }
  function importData(e){
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{try{localStorage.setItem(SK,ev.target.result);setImp(true);setTimeout(()=>window.location.reload(),800);}catch(err){alert('Virheellinen tiedosto.');}};
    r.readAsText(f);
  }
  return (
    <div style={{padding:16}}>
      <div style={{fontFamily:FS,fontSize:26,color:C.paper,marginBottom:20}}>Asetukset</div>

      <div style={{fontFamily:FU,fontSize:10,color:C.inkMute,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>Pilvisynkronointi</div>
      <div style={{background:C.bgGlow,borderRadius:10,padding:'14px',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,background:syncStatus==='ok'?'#4ade80':syncStatus==='err'?'#f87171':syncStatus==='syncing'?C.accent:C.inkFaint}}/>
          <span style={{fontFamily:FU,fontSize:12,color:syncStatus==='ok'?'#4ade80':syncStatus==='err'?'#f87171':syncStatus==='syncing'?C.accent:C.inkMute,flex:1}}>
            {syncStatus==='ok'?'Yhdistetty — synkronointi päällä':syncStatus==='err'?'Virhe — tarkista token':syncStatus==='syncing'?'Synkronoidaan…':'Ei yhteyttä'}
          </span>
          {syncCfg.gistId&&<span style={{fontFamily:FM,fontSize:9,color:C.inkFaint}}>#{syncCfg.gistId.slice(0,7)}</span>}
        </div>
        <div style={{fontFamily:FU,fontSize:11,color:C.inkMute,marginBottom:4}}>GitHub Personal Access Token</div>
        <input type="password" value={tokenInput} onChange={e=>setTokenInput(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" style={{width:'100%',padding:'10px',background:C.bg,border:`1px solid #2a201a`,borderRadius:6,color:C.paper,fontFamily:FM,fontSize:12,marginBottom:8}}/>
        <button onClick={handleConnect} style={{width:'100%',padding:'11px',background:C.accent,border:'none',borderRadius:6,cursor:'pointer',color:'#fff',fontFamily:FU,fontSize:13,fontWeight:600,marginBottom:syncCfg.gistId?6:0}}>
          {syncCfg.gistId?'Päivitä yhteys':'Yhdistä & luo Gist'}
        </button>
        {syncCfg.gistId&&(
          <div style={{display:'flex',gap:6}}>
            <button onClick={handlePull} style={{flex:1,padding:'9px',background:C.bg,border:`1px solid #2a201a`,borderRadius:6,cursor:'pointer',color:C.paper,fontFamily:FU,fontSize:12}}>⬇ Lataa pilvestä</button>
            <button onClick={handlePush} style={{flex:1,padding:'9px',background:C.bg,border:`1px solid #2a201a`,borderRadius:6,cursor:'pointer',color:C.paper,fontFamily:FU,fontSize:12}}>⬆ Tallenna pilveen</button>
          </div>
        )}
        {syncMsg&&<div style={{fontFamily:FU,fontSize:11,color:syncMsg.startsWith('✓')?'#4ade80':'#f87171',marginTop:8}}>{syncMsg}</div>}
        {!syncCfg.gistId&&<div style={{fontFamily:FU,fontSize:10,color:C.inkFaint,marginTop:10,lineHeight:1.6}}>
          Luo token: GitHub.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → New token → valitse <span style={{fontFamily:FM,color:C.accent}}>gist</span>-oikeus → kopioi token tähän.
        </div>}
      </div>

      <div style={{fontFamily:FU,fontSize:10,color:C.inkMute,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>Päivän XP-tavoite</div>
      <div style={{background:C.bgGlow,borderRadius:10,padding:'12px',marginBottom:20}}>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          {[150,250,400,600].map(g=>(
            <button key={g} onClick={()=>onGoalChange(g)} style={{flex:1,padding:'10px 0',border:`1px solid ${goal===g?C.accent:'#2a201a'}`,borderRadius:8,cursor:'pointer',background:goal===g?'rgba(201,122,60,0.15)':C.bg,color:goal===g?C.accent:C.inkMute,fontFamily:FM,fontSize:13,fontWeight:600}}>{g}</button>
          ))}
        </div>
        <div style={{fontFamily:FU,fontSize:10,color:C.inkFaint}}>150 ≈ 1 sessio · 250 ≈ hyvä sessio · 400 ≈ 2 sessiota</div>
      </div>

      <div style={{fontFamily:FU,fontSize:10,color:C.inkMute,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>Varmuuskopiointi</div>
      <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:20}}>
        <button onClick={exportData} style={{padding:'13px 16px',background:C.bgGlow,border:`1px solid #2a201a`,borderRadius:8,cursor:'pointer',textAlign:'left',color:C.paper,fontFamily:FU,fontSize:14}}>⬇ Lataa varmuuskopio (.json)</button>
        <label style={{padding:'13px 16px',background:C.bgGlow,border:`1px solid #2a201a`,borderRadius:8,cursor:'pointer',display:'block',color:imp?'#4ade80':C.paper,fontFamily:FU,fontSize:14}}>
          {imp?'✓ Tuotu!':'⬆ Tuo varmuuskopio (.json)'}
          <input type="file" accept=".json" onChange={importData} style={{display:'none'}}/>
        </label>
      </div>

      <div style={{fontFamily:FU,fontSize:10,color:C.inkMute,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>Vaara-alue</div>
      {!conf
        ?<button onClick={()=>setConf(true)} style={{width:'100%',padding:'13px 16px',background:'#1a0808',border:`1px solid #3a1818`,borderRadius:8,cursor:'pointer',textAlign:'left',color:'#f87171',fontFamily:FU,fontSize:14}}>Nollaa kaikki edistyminen</button>
        :<div style={{background:'#1a0808',border:`1px solid #3a1818`,borderRadius:8,padding:16}}>
          <div style={{fontFamily:FU,fontSize:13,color:'#f87171',marginBottom:12}}>Oletko varma? Kaikki data poistetaan pysyvästi.</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setConf(false)} style={{flex:1,padding:'10px',background:C.bgGlow,border:'none',borderRadius:6,cursor:'pointer',color:C.paper,fontFamily:FU}}>Peruuta</button>
            <button onClick={()=>{onReset();setConf(false);}} style={{flex:1,padding:'10px',background:'#3a1010',border:'none',borderRadius:6,cursor:'pointer',color:'#f87171',fontFamily:FU,fontWeight:600}}>Nollaa</button>
          </div>
        </div>
      }
      <div style={{marginTop:28,fontFamily:FM,fontSize:10,color:C.inkFaint}}>
        Sanasto v2.0 · {VOCAB.length} sanaa · {SK}
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────────────────────────── */
function App() {
  const [state,setState]=useState(()=>loadState());
  const [view,setView]=useState('home');
  const [practMode,setPractMode]=useState(null);
  const [practWords,setPractWords]=useState(null);
  const [syncStatus,setSyncStatus]=useState('idle'); // idle|syncing|ok|err

  function save(s){setState(s);saveState(s);}

  // Auto-load from Gist on startup
  useEffect(()=>{
    let cfg;
    try{ cfg=loadSyncCfg(); }catch(e){ return; }
    if(!cfg||!cfg.token||!cfg.gistId) return;
    setSyncStatus('syncing');
    gistPull(cfg.token,cfg.gistId).then(remote=>{
      if(!remote){setSyncStatus('err');return;}
      const local=loadState();
      if((remote.xp||0)>(local.xp||0)){
        const s=mergeRemote(remote);
        saveState(s);
        setState(s);
      }
      setSyncStatus('ok');
    }).catch(()=>setSyncStatus('err'));
  },[]);

  function startPractice(mode,cat) {
    const today=todayKey();
    let pool=VOCAB.filter(w=>{const ws=state.words[w.id];return !ws||ws.nextReview<=today;});
    if(cat!=='all') pool=pool.filter(w=>w.cat===cat);
    if(pool.length<5){
      pool=cat==='all'?[...VOCAB]:VOCAB.filter(w=>w.cat===cat);
    }
    const shuffled=pool.sort(()=>Math.random()-0.5).slice(0,15);
    setPractMode(mode); setPractWords(shuffled); setView('practice');
  }

  function onFinish(results) {
    const today=todayKey();
    const ns={...state,words:{...state.words}};
    results.forEach(({id,correct})=>{
      const ws={...ns.words[id]};
      ws.seen=true;
      if(correct){ws.box=Math.min((ws.box||0)+1,BOX_INTERVALS.length-1);ws.correct=(ws.correct||0)+1;}
      else{ws.box=Math.max(0,(ws.box||0)-1);ws.wrong=(ws.wrong||0)+1;}
      ws.nextReview=addDays(today,BOX_INTERVALS[ws.box]);
      ns.words[id]=ws;
    });
    const ok=results.filter(r=>r.correct).length;
    const xpGained=ok*10;
    ns.xp=(ns.xp||0)+xpGained;
    ns.todayXp=(ns.lastXpDate===today?(ns.todayXp||0):0)+xpGained;
    ns.lastXpDate=today;
    ns.totalCorrect=(ns.totalCorrect||0)+ok;
    ns.totalWrong=(ns.totalWrong||0)+(results.length-ok);
    ns.sessions=(ns.sessions||0)+1;
    if(ns.lastSession!==today){
      ns.streak=ns.lastSession===addDays(today,-1)?(ns.streak||0)+1:1;
      ns.lastSession=today;
    }
    let cur=0,mx=ns.maxCombo||0;
    results.forEach(r=>{if(r.correct){cur++;mx=Math.max(mx,cur);}else cur=0;});
    ns.maxCombo=mx;
    if(results.length>=20&&ok===results.length&&!(ns.achievements||[]).includes('perfect')){
      ns.achievements=[...(ns.achievements||[]),'perfect'];
    }
    const newA=checkAchievements(ns);
    ns.achievements=[...(ns.achievements||[]),...newA];
    save(ns);
    // Auto-sync to Gist
    const cfg=loadSyncCfg();
    if(cfg.token&&cfg.gistId){
      setSyncStatus('syncing');
      gistPush(cfg.token,cfg.gistId,ns).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err'));
    }
    setView('home'); setPractWords(null); setPractMode(null);
  }

  if(view==='practice'&&practWords) return (
    <Shell>
      <div style={{display:'flex',alignItems:'center',padding:'12px 16px',paddingTop:'max(12px,env(safe-area-inset-top))',borderBottom:`1px solid #1a1410`,background:'#0d0a07',flexShrink:0}}>
        <button onClick={()=>{setView('home');setPractWords(null);}} style={{background:'none',border:'none',cursor:'pointer',color:C.inkMute,fontFamily:FU,fontSize:13,padding:0}}>← Takaisin</button>
        <span style={{flex:1,textAlign:'center',color:C.paper,fontFamily:FU,fontSize:13,fontWeight:600}}>{practMode==='flash'?'Korttipakka':'Monivalinta'}</span>
        <span style={{width:60}}/>
      </div>
      <div style={{flex:1,overflow:'auto',display:'flex',flexDirection:'column'}}>
        <Practice mode={practMode} words={practWords} onFinish={onFinish}/>
      </div>
    </Shell>
  );

  return (
    <Shell>
      <div style={{flex:1,overflow:'auto',paddingTop:'env(safe-area-inset-top)'}}>
        {view==='home'&&<HomeView state={state} onPractice={startPractice}/>}
        {view==='library'&&<LibraryView state={state}/>}
        {view==='stats'&&<StatsView state={state}/>}
        {view==='guide'&&<GuideView state={state}/>}
        {view==='settings'&&<SettingsView state={state} onReset={()=>save(defaultState())} onGoalChange={g=>save({...state,dailyGoal:g})} syncStatus={syncStatus} setSyncStatus={setSyncStatus} onSyncLoad={r=>{const s=mergeRemote(r);save(s);}}/>}
      </div>
      <BottomNav view={view} setView={setView}/>
    </Shell>
  );
}

const rootEl=document.getElementById('root');
rootEl.dataset.mounted='1';
ReactDOM.createRoot(rootEl).render(<App/>);
</script>
</body>
</html>

/* ── Helpers ─────────────────────────────────────────────────────────────── */
const todayKey    = () => new Date().toISOString().slice(0,10);
const daysBetween = (a,b) => Math.floor((new Date(a)-new Date(b))/86400000);
const addDays     = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r.toISOString(); };
const getLevel    = xp => {
  let cur=LEVELS[0];
  for(const l of LEVELS) if(xp>=l.min) cur=l;
  const next=LEVELS[LEVELS.indexOf(cur)+1];
  return {current:cur,next,progress:next?(xp-cur.min)/(next.min-cur.min):1};
};
const defaultState = () => ({
  xp:0,totalCorrect:0,totalWrong:0,streak:0,lastSessionDate:null,
  dailyGoal:100,todayXp:0,todayDate:todayKey(),achievements:[],
  wordProgress:{},customWords:[],totalSessions:0,sessionHistory:[]
});
const makeOptions = (word,pool) => {
  const others=pool.filter(w=>w.id!==word.id);
  const same=others.filter(w=>w.cat===word.cat);
  const src=same.length>=3?same:[...same,...others.filter(w=>w.cat!==word.cat)];
  return [...[...src].sort(()=>Math.random()-.5).slice(0,3),word].sort(()=>Math.random()-.5);
};

/* ── localStorage ────────────────────────────────────────────────────────── */
const loadState = () => {
  try { const d=localStorage.getItem(SK); if(d) return {...defaultState(),...JSON.parse(d)}; }
  catch(_){}
  return defaultState();
};
const saveState = s => { try { localStorage.setItem(SK,JSON.stringify(s)); } catch(_){} };

/* ── App ─────────────────────────────────────────────────────────────────── */
function App() {
  const [st,  setSt]  = useState(()=>{
    const s=loadState(); const today=todayKey();
    if(s.todayDate!==today){
      if(s.lastSessionDate&&daysBetween(today,s.lastSessionDate)>1) s.streak=0;
      s.todayDate=today; s.todayXp=0;
    }
    return s;
  });
  const [view, setView]= useState('home');
  const [sess, setSess]= useState(null);
  const [cat,  setCat] = useState('all');
  const [addW, setAddW]= useState(false);
  const [nw,   setNw]  = useState({fi:'',en:'',cat:'basics',exFi:'',exEn:'',tip:''});
  const [exp,  setExp] = useState(null);
  const [pop,  setPop] = useState(null);

  useEffect(()=>{ saveState(st); },[st]);

  const allWords=[...VOCAB,...st.customWords];
  const lv=getLevel(st.xp);

  const startSession=mode=>{
    const due=allWords.filter(w=>{const p=st.wordProgress[w.id];return p?.nextReview&&new Date(p.nextReview)<=new Date();});
    const lvIdx=LEVELS.indexOf(lv.current);
    const tDiff=Math.min(3,Math.max(1,Math.floor(lvIdx/2)+1));
    const fresh=allWords.filter(w=>!st.wordProgress[w.id]).sort((a,b)=>Math.abs(a.diff-tDiff)-Math.abs(b.diff-tDiff));
    let q=[...due]; let i=0;
    while(q.length<15&&i<fresh.length) q.push(fresh[i++]);
    if(!q.length) q=[...allWords].sort(()=>Math.random()-.5).slice(0,10);
    q.sort(()=>Math.random()-.5);
    const opts=mode==='quiz'?q.map(w=>makeOptions(w,allWords)):q.map(()=>[]);
    setSess({mode,queue:q,opts,idx:0,correct:0,wrong:0,combo:0,maxCombo:0,xp:0,flipped:false,answered:false,selAns:null,start:Date.now(),done:false,unlocked:[]});
    setView('practice');
  };

  const answer=correct=>{
    if(!sess||sess.answered) return;
    const word=sess.queue[sess.idx];
    const prev=st.wordProgress[word.id]||{box:0,correct:0,wrong:0};
    const box=correct?Math.min(5,prev.box+1):Math.max(0,prev.box-1);
    const xpGain=correct?5+Math.min(15,sess.combo)+(word.diff-1)*2:1;
    setSt(s=>({...s,totalCorrect:s.totalCorrect+(correct?1:0),totalWrong:s.totalWrong+(correct?0:1),
      wordProgress:{...s.wordProgress,[word.id]:{box,nextReview:addDays(new Date(),BOX_INTERVALS[box]),correct:prev.correct+(correct?1:0),wrong:prev.wrong+(correct?0:1),lastSeen:new Date().toISOString()}}}));
    setSess(s=>({...s,answered:true,correct:s.correct+(correct?1:0),wrong:s.wrong+(correct?0:1),
      combo:correct?s.combo+1:0,maxCombo:correct?Math.max(s.maxCombo,s.combo+1):s.maxCombo,xp:s.xp+xpGain}));
  };

  const selectOpt=opt=>{
    if(!sess||sess.answered) return;
    const correct=opt.id===sess.queue[sess.idx].id;
    setSess(s=>({...s,selAns:opt.id}));
    answer(correct);
  };

  const next=()=>{
    if(!sess) return;
    if(sess.idx+1>=sess.queue.length){finish();return;}
    setSess(s=>({...s,idx:s.idx+1,flipped:false,answered:false,selAns:null}));
  };

  const finish=()=>{
    if(!sess) return;
    const today=todayKey(); const isNew=st.lastSessionDate!==today;
    let streak=st.streak;
    if(isNew) streak=st.lastSessionDate&&daysBetween(today,st.lastSessionDate)===1?st.streak+1:1;
    const ach=[...st.achievements];
    const u=id=>{if(!ach.includes(id))ach.push(id);};
    if(!st.totalSessions)u('first_session');
    if(streak>=3)u('streak_3'); if(streak>=7)u('streak_7'); if(streak>=30)u('streak_30');
    if(sess.maxCombo>=10)u('combo_10');
    if(sess.queue.length>=20&&sess.wrong===0)u('perfect');
    setSt(s=>{
      const wp=s.wordProgress; const m=Object.values(wp).filter(p=>p.box>=3).length;
      if(m>=25)u('words_25'); if(m>=50)u('words_50');
      if(allWords.filter(w=>w.cat==='ifrs').every(w=>(wp[w.id]?.box||0)>=4))u('ifrs_master');
      return {...s,xp:s.xp+sess.xp,todayXp:s.todayXp+sess.xp,lastSessionDate:today,streak,achievements:ach,
        totalSessions:s.totalSessions+1,
        sessionHistory:[{date:today,mode:sess.mode,correct:sess.correct,wrong:sess.wrong,xp:sess.xp,words:sess.queue.length,maxCombo:sess.maxCombo,dur:Math.round((Date.now()-sess.start)/1000)},...s.sessionHistory.slice(0,49)]};
    });
    setSess(s=>({...s,done:true,unlocked:ach.filter(a=>!st.achievements.includes(a)),newStreak:streak}));
  };

  const buildExport=()=>{
    const ws=Object.entries(st.wordProgress).map(([id,p])=>{const w=allWords.find(x=>x.id===id);return w?{fi:w.fi,en:w.en,cat:w.cat,box:p.box,correct:p.correct,wrong:p.wrong,acc:p.correct+p.wrong>0?Math.round(100*p.correct/(p.correct+p.wrong)):null}:null;}).filter(Boolean);
    const cs={}; Object.keys(CATEGORIES).forEach(k=>{const cws=ws.filter(w=>w.cat===k);cs[k]={studied:cws.length,mastered:cws.filter(w=>w.box>=3).length,avgAcc:cws.length?Math.round(cws.reduce((s,w)=>s+(w.acc||0),0)/cws.length):null};});
    setExp(JSON.stringify({exportDate:new Date().toISOString(),xp:st.xp,level:lv.current.title,streak:st.streak,sessions:st.totalSessions,overallAccuracy:st.totalCorrect+st.totalWrong>0?Math.round(100*st.totalCorrect/(st.totalCorrect+st.totalWrong)):null,achievements:st.achievements,categories:cs,weakWords:ws.filter(w=>w.wrong>=2&&w.box<=2).slice(0,10),strongWords:ws.filter(w=>w.box>=4).map(w=>`${w.fi}/${w.en}`),recent:st.sessionHistory.slice(0,10)},null,2));
  };

  const W='max-w-md mx-auto min-h-screen';

  /* HOME */
  if(view==='home'){
    const learned=Object.values(st.wordProgress).filter(p=>p.box>=3).length;
    const acc=st.totalCorrect+st.totalWrong>0?Math.round(100*st.totalCorrect/(st.totalCorrect+st.totalWrong)):0;
    const lastA=ACHIEVEMENTS.find(a=>a.id===st.achievements[st.achievements.length-1]);
    return (
      <div className={`${W} pb-28`}>
        <div className="px-5 pt-6 pb-4">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-3">
              <div className="text-4xl">{lv.current.icon}</div>
              <div><div className="text-xs text-slate-400 uppercase tracking-wider">Your level</div><div className="text-lg font-semibold text-slate-100">{lv.current.title}</div></div>
            </div>
            <div className="flex items-center gap-1.5 bg-orange-500/10 border border-orange-500/30 px-3 py-1.5 rounded-full">
              <Flame className={`w-4 h-4 ${st.streak>0?'text-orange-400':'text-slate-500'}`}/><span className="text-sm font-semibold text-orange-400">{st.streak}</span>
            </div>
          </div>
          <div className="mb-1 flex justify-between text-xs"><span className="text-slate-400">{st.xp} XP</span>{lv.next&&<span className="text-slate-500">{lv.next.min-st.xp} XP → {lv.next.title}</span>}</div>
          <div className="h-2 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 transition-all" style={{width:`${lv.progress*100}%`}}/></div>
        </div>
        <div className="mx-5 mb-5 p-5 rounded-2xl bg-slate-900 border border-slate-800">
          <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2"><TargetIco className="w-4 h-4 text-violet-400"/><span className="text-sm font-medium text-slate-200">Päivän tavoite</span></div><span className="text-sm text-slate-400">{st.todayXp}/{st.dailyGoal} XP</span></div>
          <div className="h-2.5 bg-slate-800 rounded-full overflow-hidden mb-2"><div className="h-full bg-gradient-to-r from-emerald-500 to-teal-500" style={{width:`${Math.min(1,st.todayXp/st.dailyGoal)*100}%`}}/></div>
          {st.todayXp>=st.dailyGoal?<div className="text-xs text-emerald-400 flex items-center gap-1.5"><CheckIco className="w-3.5 h-3.5"/>Tavoite saavutettu!</div>:<div className="text-xs text-slate-500">~15 min harjoittelua riittää</div>}
        </div>
        <div className="px-5 mb-5">
          <button onClick={()=>setView('modes')} className="w-full p-5 rounded-2xl bg-gradient-to-br from-violet-600 to-fuchsia-600 active:scale-[0.98] transition shadow-lg shadow-violet-500/20">
            <div className="flex items-center justify-between"><div><div className="text-xs uppercase tracking-wider text-violet-100/80 mb-0.5">Aloita harjoitus</div><div className="text-lg font-semibold text-white">Start daily practice</div></div><ChevronR className="w-6 h-6 text-white"/></div>
          </button>
        </div>
        <div className="px-5 grid grid-cols-2 gap-3 mb-5">
          <KCard icon={BookOpen} label="Sanoja opittu" value={learned} sub={`/ ${allWords.length}`}/>
          <KCard icon={TrendUp} label="Tarkkuus" value={`${acc}%`} sub="kaikki sessiot"/>
          <KCard icon={SparklesIco} label="Sessiot" value={st.totalSessions} sub="yhteensä"/>
          <KCard icon={AwardIco} label="Saavutukset" value={st.achievements.length} sub={`/ ${ACHIEVEMENTS.length}`}/>
        </div>
        {lastA&&<div className="px-5 mb-5"><div className="text-xs uppercase tracking-wider text-slate-500 mb-2 px-1">Viimeisin saavutus</div><div className="p-4 rounded-xl bg-slate-900 border border-slate-800 flex items-center gap-3"><div className="text-3xl">{lastA.icon}</div><div><div className="font-semibold text-sm text-slate-100">{lastA.title}</div><div className="text-xs text-slate-400">{lastA.desc}</div></div></div></div>}
        <Nav view={view} setView={setView}/>
      </div>
    );
  }

  /* MODES */
  if(view==='modes') return (
    <div className={W}>
      <TopBar title="Valitse harjoitustyyppi" back={()=>setView('home')}/>
      <div className="p-5 space-y-3">
        {[{icon:BrainIco,title:'Muistikortit',desc:'Katso sana, mieti vastaus, käännä kortti',color:'from-violet-500 to-fuchsia-500',mode:'flashcard'},
          {icon:TargetIco,title:'Monivalintatesti',desc:'Valitse oikea käännös neljästä vaihtoehdosta',color:'from-emerald-500 to-teal-500',mode:'quiz'}
        ].map(({icon:Icon,title,desc,color,mode})=>(
          <button key={mode} onClick={()=>startSession(mode)} className="w-full p-5 rounded-2xl bg-slate-900 border border-slate-800 hover:border-slate-700 active:scale-[0.98] transition text-left">
            <div className="flex items-start gap-4">
              <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${color} flex items-center justify-center shrink-0`}><Icon className="w-6 h-6 text-white"/></div>
              <div className="flex-1"><div className="font-semibold text-slate-100 mb-0.5">{title}</div><div className="text-sm text-slate-400">{desc}</div></div>
              <ChevronR className="w-5 h-5 text-slate-600 mt-3"/>
            </div>
          </button>
        ))}
        <div className="text-xs text-slate-500 px-1 pt-2">SRS valitsee sanat automaattisesti taitojesi mukaan.</div>
      </div>
    </div>
  );

  /* PRACTICE */
  if(view==='practice'&&sess){
    if(sess.done){
      const acc2=sess.correct+sess.wrong>0?Math.round(100*sess.correct/(sess.correct+sess.wrong)):0;
      const ins=acc2>=90?'Erinomainen! Vaikeustaso nousee automaattisesti kun kehityt.':acc2>=70?'Hyvää työtä — pari sanaa palaa SRS:n optimaalisin välein.':acc2>=50?'Toistot tekevät mestarin. Vaikeat sanat palaavat huomenna.':'Haastava sessio — kokeile Library-välilehteä ennen seuraavaa harjoitusta.';
      return (
        <div className={`${W} px-5 pt-8 pb-10`}>
          <div className="text-center mb-8"><div className="text-6xl mb-3">{acc2>=80?'🎉':acc2>=60?'💪':'🌱'}</div><div className="text-2xl font-bold text-slate-100 mb-1">Sessio valmis!</div><div className="text-sm text-slate-400">+{sess.xp} XP</div></div>
          <div className="grid grid-cols-3 gap-3 mb-6">
            {[['text-emerald-400',sess.correct,'Oikein'],['text-rose-400',sess.wrong,'Väärin'],['text-amber-400',sess.maxCombo+'x','Max combo']].map(([c,v,l])=>(
              <div key={l} className="p-3 rounded-xl bg-slate-900 border border-slate-800 text-center"><div className={`text-2xl font-semibold ${c}`}>{v}</div><div className="text-xs text-slate-500 mt-0.5">{l}</div></div>
            ))}
          </div>
          <div className="p-4 rounded-xl bg-violet-500/5 border border-violet-500/20 mb-5"><div className="flex items-start gap-2"><SparklesIco className="w-4 h-4 text-violet-400 shrink-0 mt-0.5"/><div><div className="text-xs uppercase tracking-wider text-violet-400 mb-1">Daily Insight</div><div className="text-sm text-slate-200 leading-relaxed">{ins}</div></div></div></div>
          {sess.newStreak>1&&<div className="p-4 rounded-xl bg-orange-500/5 border border-orange-500/20 mb-5 flex items-center gap-3"><Flame className="w-6 h-6 text-orange-400"/><div><div className="font-semibold text-orange-400">{sess.newStreak} päivän streak! 🔥</div><div className="text-xs text-slate-400">Pidä yllä huomennakin!</div></div></div>}
          {sess.unlocked?.length>0&&<div className="space-y-2 mb-5"><div className="text-xs uppercase tracking-wider text-slate-500 px-1">Uudet saavutukset</div>{sess.unlocked.map(id=>{const a=ACHIEVEMENTS.find(x=>x.id===id);return a?<div key={id} className="p-4 rounded-xl bg-gradient-to-br from-amber-500/10 to-orange-500/10 border border-amber-500/30 flex items-center gap-3"><div className="text-3xl">{a.icon}</div><div><div className="font-semibold text-amber-300">{a.title}</div><div className="text-xs text-slate-400">{a.desc}</div></div></div>:null;})}</div>}
          <button onClick={()=>{setSess(null);setView('home');}} className="w-full py-4 rounded-2xl bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-semibold active:scale-[0.97] transition">Takaisin etusivulle</button>
        </div>
      );
    }
    const word=sess.queue[sess.idx]; const pct=(sess.idx+1)/sess.queue.length;
    return (
      <div className={`${W} flex flex-col min-h-screen`}>
        <div className="px-4 pt-4 pb-3">
          <div className="flex items-center justify-between mb-3">
            <button onClick={()=>{if(window.confirm('Keskeyttää sessio?')){setSess(null);setView('home');}}} className="p-2 -ml-2 rounded-lg hover:bg-slate-800"><XIco className="w-5 h-5 text-slate-400"/></button>
            <div className="flex items-center gap-3 text-sm">
              {sess.combo>=3&&<div className="flex items-center gap-1 bg-orange-500/10 border border-orange-500/30 px-2 py-0.5 rounded-full"><ZapIco className="w-3.5 h-3.5 text-orange-400"/><span className="text-orange-400 font-semibold">{sess.combo}x</span></div>}
              <span className="text-slate-400">{sess.idx+1}/{sess.queue.length}</span>
            </div>
          </div>
          <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-violet-500 to-fuchsia-500 transition-all" style={{width:`${pct*100}%`}}/></div>
        </div>
        <div className="flex-1 px-5 pb-5 flex flex-col justify-center">
          {sess.mode==='flashcard'
            ?<Flashcard word={word} flipped={sess.flipped} answered={sess.answered} idx={sess.idx} qLen={sess.queue.length} onFlip={()=>setSess(s=>({...s,flipped:!s.flipped}))} onAnswer={answer} onNext={next}/>
            :<Quiz word={word} options={sess.opts[sess.idx]||[]} selAns={sess.selAns} answered={sess.answered} idx={sess.idx} qLen={sess.queue.length} onSelect={selectOpt} onNext={next}/>
          }
        </div>
      </div>
    );
  }

  /* LIBRARY */
  if(view==='library'){
    const filtered=cat==='all'?allWords:allWords.filter(w=>w.cat===cat);
    return (
      <div className={`${W} pb-28`}>
        <TopBar title="Library"/>
        <div className="px-4 pt-3 pb-2 overflow-x-auto"><div className="flex gap-2 pb-2">
          <CatPill active={cat==='all'} onClick={()=>setCat('all')}>Kaikki ({allWords.length})</CatPill>
          {Object.entries(CATEGORIES).map(([k,v])=><CatPill key={k} active={cat===k} onClick={()=>setCat(k)}>{v.short} ({allWords.filter(w=>w.cat===k).length})</CatPill>)}
        </div></div>
        <div className="px-5 mb-4">
          <button onClick={()=>setAddW(true)} className="w-full py-3 rounded-xl border border-dashed border-slate-700 text-slate-400 hover:border-slate-600 transition flex items-center justify-center gap-2"><PlusIco className="w-4 h-4"/><span className="text-sm">Lisää oma sana</span></button>
        </div>
        <div className="px-5 space-y-2">
          {filtered.map(w=>{const box=st.wordProgress[w.id]?.box||0;return(
            <div key={w.id} className="p-4 rounded-xl bg-slate-900 border border-slate-800">
              <div className="flex items-start justify-between gap-3 mb-1"><div className="flex-1 min-w-0"><div className="text-sm font-medium text-slate-100">{w.fi}</div><div className="text-sm text-slate-400">{w.en}</div></div><Dots box={box}/></div>
              <span className={`inline-block text-[10px] uppercase tracking-wider px-2 py-0.5 rounded mt-1 bg-gradient-to-r ${CATEGORIES[w.cat].color} text-white`}>{CATEGORIES[w.cat].short}</span>
            </div>
          );})}
        </div>
        {addW&&(
          <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-4">
            <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-5 max-h-[90vh] overflow-y-auto">
              <div className="flex items-center justify-between mb-4"><h3 className="font-semibold text-slate-100">Lisää oma sana</h3><button onClick={()=>setAddW(false)} className="p-1 rounded-lg hover:bg-slate-800"><XIco className="w-4 h-4 text-slate-400"/></button></div>
              <div className="space-y-3">
                <Field label="Suomeksi *" value={nw.fi} onChange={v=>setNw({...nw,fi:v})}/>
                <Field label="Englanniksi *" value={nw.en} onChange={v=>setNw({...nw,en:v})}/>
                <div><label className="text-xs text-slate-400 block mb-1">Kategoria</label><select value={nw.cat} onChange={e=>setNw({...nw,cat:e.target.value})} className="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-sm text-slate-100">{Object.entries(CATEGORIES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
                <Field label="Esimerkki (FI)" value={nw.exFi} onChange={v=>setNw({...nw,exFi:v})}/>
                <Field label="Esimerkki (EN)" value={nw.exEn} onChange={v=>setNw({...nw,exEn:v})}/>
                <Field label="Vinkki" value={nw.tip} onChange={v=>setNw({...nw,tip:v})} area/>
                <button onClick={()=>{if(!nw.fi.trim()||!nw.en.trim())return;setSt(s=>({...s,customWords:[...s.customWords,{...nw,id:'c'+Date.now(),diff:2}]}));setNw({fi:'',en:'',cat:'basics',exFi:'',exEn:'',tip:''});setAddW(false);}} disabled={!nw.fi.trim()||!nw.en.trim()} className="w-full py-3 rounded-xl bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-semibold disabled:opacity-40 disabled:cursor-not-allowed">Tallenna</button>
              </div>
            </div>
          </div>
        )}
        <Nav view={view} setView={setView}/>
      </div>
    );
  }

  /* STATS */
  if(view==='stats'){
    const wp=st.wordProgress;
    const catStats=Object.entries(CATEGORIES).map(([k,v])=>{
      const cws=allWords.filter(w=>w.cat===k);
      const tc=cws.reduce((s,w)=>s+(wp[w.id]?.correct||0),0);
      const tw=cws.reduce((s,w)=>s+(wp[w.id]?.wrong||0),0);
      return{k,...v,total:cws.length,mastered:cws.filter(w=>(wp[w.id]?.box||0)>=3).length,acc:tc+tw>0?Math.round(100*tc/(tc+tw)):null};
    });
    const weak=Object.entries(wp).filter(([,p])=>p.wrong>=2&&p.box<=2).sort((a,b)=>b[1].wrong-a[1].wrong).slice(0,5).map(([id,p])=>({word:allWords.find(w=>w.id===id),p})).filter(x=>x.word);
    return (
      <div className={`${W} pb-28`}>
        <TopBar title="Edistyminen"/>
        <div className="px-5 pt-4">
          <div className="mb-6"><div className="text-xs uppercase tracking-wider text-slate-500 mb-3 px-1">Hallinta kategorioittain</div>
            <div className="space-y-2">{catStats.map(s=>(
              <div key={s.k} className="p-3 rounded-xl bg-slate-900 border border-slate-800">
                <div className="flex items-center justify-between mb-2"><span className="text-sm text-slate-200">{s.label}</span><span className="text-xs text-slate-400">{s.mastered}/{s.total}</span></div>
                <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden"><div className={`h-full bg-gradient-to-r ${s.color}`} style={{width:`${s.total?s.mastered/s.total*100:0}%`}}/></div>
                {s.acc!==null&&<div className="text-[10px] text-slate-500 mt-1.5">Tarkkuus: {s.acc}%</div>}
              </div>
            ))}</div>
          </div>
          {weak.length>0&&<div className="mb-6"><div className="text-xs uppercase tracking-wider text-slate-500 mb-3 px-1">Kehitettävää</div>
            <div className="space-y-2">{weak.map(({word,p})=>(
              <div key={word.id} className="p-3 rounded-xl bg-rose-500/5 border border-rose-500/20">
                <div className="flex items-center justify-between"><div><div className="text-sm text-slate-200">{word.fi}</div><div className="text-xs text-slate-400">{word.en}</div></div><div className="text-xs text-rose-400">{p.wrong} virhettä</div></div>
              </div>
            ))}</div>
          </div>}
          <div className="mb-6"><div className="text-xs uppercase tracking-wider text-slate-500 mb-3 px-1">Saavutukset ({st.achievements.length}/{ACHIEVEMENTS.length})</div>
            <div className="grid grid-cols-2 gap-2">{ACHIEVEMENTS.map(a=>{const ok=st.achievements.includes(a.id);return(
              <div key={a.id} className={`p-3 rounded-xl border ${ok?'bg-amber-500/5 border-amber-500/30':'bg-slate-900 border-slate-800 opacity-50'}`}>
                <div className="text-2xl mb-1">{a.icon}</div><div className={`text-xs font-semibold ${ok?'text-amber-300':'text-slate-400'}`}>{a.title}</div><div className="text-[10px] text-slate-500 mt-0.5">{a.desc}</div>
              </div>
            );})}</div>
          </div>
          <button onClick={buildExport} className="w-full py-3 rounded-xl bg-slate-900 border border-slate-800 text-slate-200 font-medium flex items-center justify-center gap-2 active:scale-[0.98] transition mb-4"><DownloadIco className="w-4 h-4"/>Vie edistyminen Claudelle</button>
          {exp&&(
            <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-4">
              <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-5 max-h-[90vh] overflow-y-auto">
                <div className="flex items-center justify-between mb-3"><h3 className="font-semibold text-slate-100">Export Claudelle</h3><button onClick={()=>setExp(null)} className="p-1 rounded-lg hover:bg-slate-800"><XIco className="w-4 h-4 text-slate-400"/></button></div>
                <p className="text-xs text-slate-400 mb-3">Kopioi ja liitä Claudelle uudessa keskustelussa pyytäen analyysiä tai uusia harjoituksia.</p>
                <pre className="text-[10px] text-slate-300 bg-slate-950 p-3 rounded-lg overflow-x-auto whitespace-pre-wrap max-h-64 mb-3">{exp}</pre>
                <button onClick={()=>{navigator.clipboard?.writeText(exp);setPop('Kopioitu!');setTimeout(()=>setPop(null),2000);}} className="w-full py-3 rounded-xl bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white font-semibold flex items-center justify-center gap-2"><CopyIco className="w-4 h-4"/>Kopioi</button>
              </div>
            </div>
          )}
        </div>
        <Nav view={view} setView={setView}/>
      </div>
    );
  }

  /* SETTINGS */
  return (
    <div className={`${W} pb-28`}>
      <TopBar title="Asetukset"/>
      <div className="px-5 pt-4 space-y-4">
        <div className="p-4 rounded-xl bg-slate-900 border border-slate-800">
          <div className="text-sm font-medium text-slate-100 mb-2">Päivän XP-tavoite</div>
          <div className="flex gap-2">{[50,100,150,200].map(g=><button key={g} onClick={()=>setSt(s=>({...s,dailyGoal:g}))} className={`flex-1 py-2 rounded-lg text-sm font-medium ${st.dailyGoal===g?'bg-violet-500/20 border border-violet-500/40 text-violet-300':'bg-slate-800 text-slate-400'}`}>{g}</button>)}</div>
          <div className="text-xs text-slate-500 mt-2">100 XP ≈ 15 min harjoittelua</div>
        </div>
        <div className="p-4 rounded-xl bg-slate-900 border border-slate-800">
          <div className="text-sm font-medium text-slate-100 mb-2">📱 Asenna iPhoneen</div>
          <div className="text-xs text-slate-400 leading-relaxed">1. Avaa <strong className="text-slate-300">makelai.github.io/english-trainer</strong> Safarissa<br/>2. Napauta jako-painiketta (□↑)<br/>3. Valitse "Lisää Koti-näyttöön"<br/>4. Sovellus toimii kuin natiivi app!</div>
        </div>
        <div className="p-4 rounded-xl bg-slate-900 border border-slate-800">
          <div className="text-sm font-medium text-slate-100 mb-1">🔒 Yksityisyys</div>
          <div className="text-xs text-slate-400">Data tallennetaan vain tähän selaimeen (localStorage). Mikään ei lähde laitteeltasi.</div>
        </div>
        <button onClick={()=>{if(window.confirm('Nollaa kaikki edistyminen? Ei voi peruuttaa.'))setSt(defaultState());}} className="w-full py-3 rounded-xl bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm font-medium">Nollaa kaikki edistyminen</button>
      </div>
      <Nav view={view} setView={setView}/>
      {pop&&<div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full bg-slate-800 border border-slate-700 text-sm text-slate-100 shadow-xl">{pop}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
